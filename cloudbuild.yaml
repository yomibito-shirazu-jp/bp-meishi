steps:
  # フロントエンドビルド: VITE_GOOGLE_API_KEY は Secret Manager から取得
  # 事前セットアップ(1回のみ):
  #   echo -n "<NEW_API_KEY>" | gcloud secrets create VITE_GOOGLE_API_KEY --data-file=-
  #   gcloud secrets add-iam-policy-binding VITE_GOOGLE_API_KEY \
  #     --member="serviceAccount:${PROJECT_NUMBER}@cloudbuild.gserviceaccount.com" \
  #     --role="roles/secretmanager.secretAccessor"
  # ⚠ このキーは Vite によってフロントエンド JS バンドルに埋め込まれ公開される。
  #    必ず GCP コンソールで HTTP リファラ制限 (本番ドメインのみ) を掛けること。
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    secretEnv: ['VITE_GOOGLE_API_KEY', 'VITE_GOOGLE_AI_KEY']
    args:
      - '-c'
      - |
        docker build \
          -f Dockerfile.web \
          --build-arg VITE_API_URL="${_VITE_API_URL}" \
          --build-arg VITE_SUPABASE_URL="${_VITE_SUPABASE_URL}" \
          --build-arg VITE_SUPABASE_ANON_KEY="${_VITE_SUPABASE_ANON_KEY}" \
          --build-arg VITE_GOOGLE_CLIENT_ID="${_VITE_GOOGLE_CLIENT_ID}" \
          --build-arg VITE_GOOGLE_API_KEY="$$VITE_GOOGLE_API_KEY" \
          --build-arg VITE_GOOGLE_AI_KEY="$$VITE_GOOGLE_AI_KEY" \
          --build-arg VITE_GOOGLE_PROJECT_ID="${_VITE_GOOGLE_PROJECT_ID}" \
          --build-arg VITE_GOOGLE_PROJECT_NUMBER="${_VITE_GOOGLE_PROJECT_NUMBER}" \
          --build-arg VITE_DOCUMENT_AI_LOCATION="${_VITE_DOCUMENT_AI_LOCATION}" \
          --build-arg VITE_DOCUMENT_AI_PROCESSOR_ID="${_VITE_DOCUMENT_AI_PROCESSOR_ID}" \
          --build-arg VITE_DOCUMENT_AI_VERSION_ID="${_VITE_DOCUMENT_AI_VERSION_ID}" \
          --build-arg VITE_USE_DOCUMENT_AI="${_VITE_USE_DOCUMENT_AI}" \
          --build-arg CACHEBUST=$BUILD_ID \
          --no-cache \
          -t asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/meishi:$BUILD_ID \
          .

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/meishi:$BUILD_ID'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'meishi'
      - '--image'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/meishi:$BUILD_ID'
      - '--region'
      - 'asia-northeast1'
      - '--allow-unauthenticated'

options:
  logging: CLOUD_LOGGING_ONLY

availableSecrets:
  secretManager:
    # Maps / Drive など Google API キー (HTTP リファラ制限必須)
    - versionName: projects/$PROJECT_ID/secrets/GOOGLE_API_KEY_2/versions/latest
      env: 'VITE_GOOGLE_API_KEY'
    # Gemini API キー (専用シークレット。バックエンドは GOOGLE_AI_KEY を使用)
    - versionName: projects/$PROJECT_ID/secrets/VITE_GOOGLE_AI_KEY/versions/latest
      env: 'VITE_GOOGLE_AI_KEY'

