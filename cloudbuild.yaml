steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'Dockerfile.web'
      - '--build-arg'
      - 'VITE_API_URL=${_VITE_API_URL}'
      - '--build-arg'
      - 'VITE_SUPABASE_URL=${_VITE_SUPABASE_URL}'
      - '--build-arg'
      - 'VITE_SUPABASE_ANON_KEY=${_VITE_SUPABASE_ANON_KEY}'
      - '--build-arg'
      - 'VITE_GOOGLE_AI_KEY=${_VITE_GOOGLE_AI_KEY}'
      - '--build-arg'
      - 'VITE_GOOGLE_CLIENT_ID=${_VITE_GOOGLE_CLIENT_ID}'
      - '--build-arg'
      - 'VITE_GOOGLE_API_KEY=${_VITE_GOOGLE_API_KEY}'
      - '--build-arg'
      - 'VITE_GOOGLE_PROJECT_ID=${_VITE_GOOGLE_PROJECT_ID}'
      - '--build-arg'
      - 'VITE_GOOGLE_PROJECT_NUMBER=${_VITE_GOOGLE_PROJECT_NUMBER}'
      - '--build-arg'
      - 'VITE_DOCUMENT_AI_LOCATION=${_VITE_DOCUMENT_AI_LOCATION}'
      - '--build-arg'
      - 'VITE_DOCUMENT_AI_PROCESSOR_ID=${_VITE_DOCUMENT_AI_PROCESSOR_ID}'
      - '--build-arg'
      - 'VITE_DOCUMENT_AI_VERSION_ID=${_VITE_DOCUMENT_AI_VERSION_ID}'
      - '--build-arg'
      - 'VITE_USE_DOCUMENT_AI=${_VITE_USE_DOCUMENT_AI}'
      - '--build-arg'
      - 'CACHEBUST=$BUILD_ID'
      - '--no-cache'
      - '-t'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/meishi:$BUILD_ID'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/meishi:$BUILD_ID'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'meishi'
      - '--image'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/meishi:$BUILD_ID'
      - '--region'
      - 'asia-northeast1'
      - '--allow-unauthenticated'

options:
  logging: CLOUD_LOGGING_ONLY

