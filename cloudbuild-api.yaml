steps:
  # バックエンドAPIのDockerイメージをビルド
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'Dockerfile'
      - '-t'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/meishi-api:$BUILD_ID'
      - '.'

  # イメージをArtifact Registryにプッシュ
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/meishi-api:$BUILD_ID'

  # Cloud Runにデプロイ（GOOGLE_AI_KEY環境変数付き）
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'meishi-api'
      - '--image'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/meishi-api:$BUILD_ID'
      - '--region'
      - 'asia-northeast1'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'GOOGLE_AI_KEY=${_GOOGLE_AI_KEY}'
      - '--memory'
      - '1Gi'
      - '--timeout'
      - '180'

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _GOOGLE_AI_KEY: 'AIzaSyCO9_oK-VZ6eWPZcO4SHLvhkR5hAv69gbg'
